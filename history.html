<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arizona Gadgets - Receipt History</title>
  <style>
    body { font-family: monospace; background: #f8f9fa; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #0066ff; margin-bottom: 10px; }
    .controls { text-align: center; margin: 15px 0; }
    .clear-btn {
      background: #dc3545; color: white; border: none; padding: 10px 20px;
      border-radius: 8px; font-size: 15px; cursor: pointer; margin: 0 10px;
    }
    .back-btn {
      background: #6c757d; color: white; border: none; padding: 10px 20px;
      border-radius: 8px; font-size: 15px; cursor: pointer; margin: 0 10px;
    }
    .history-list { max-width: 800px; margin: 0 auto; }
    .receipt-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 15px;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .receipt-card:hover { border-color: #0066ff; }
    .receipt-header { font-weight: bold; margin-bottom: 8px; }
    .print-btn {
      background: #0066ff; color: white; border: none; padding: 8px 16px;
      border-radius: 6px; cursor: pointer; float: right;
    }
  </style>
</head>
<body>

  <h1>📋 Receipt History</h1>

  <div class="controls">
    <button class="back-btn" onclick="window.location.href='index.html'">← Back to Receipt Maker</button>
    <button class="clear-btn" onclick="clearHistory()">🗑️ Clear All History</button>
  </div>

  <div class="history-list" id="history-list"></div>

  <script>
    function loadHistory() {
      const history = JSON.parse(localStorage.getItem("receiptHistory")) || [];
      const container = document.getElementById("history-list");
      container.innerHTML = "";

      if (history.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#666; padding:40px 0;">No receipts saved yet.</p>';
        return;
      }

      history.forEach((r, index) => {
        const card = document.createElement("div");
        card.className = "receipt-card";
        card.innerHTML = `
          <div class="receipt-header">
            ${r.date} • ${r.receiptNo} • ${r.customer}
            <button class="print-btn" onclick="printOldReceipt(${r.id})">🖨️ Print Receipt</button>
          </div>
          <div>Total: ${r.total}</div>
          <div style="color:#555; font-size:0.9em; margin-top:4px;">${r.address || ''}</div>
        `;
        container.appendChild(card);
      });
    }

    function printOldReceipt(id) {
      const history = JSON.parse(localStorage.getItem("receiptHistory")) || [];
      const receipt = history.find(r => r.id === id);
      if (!receipt) {
        alert("Receipt not found.");
        return;
      }

      // Create clean printable version
      const printWindow = window.open('', '_blank');
      printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
          <title>Receipt ${receipt.receiptNo}</title>
          <style>
            body { font-family: monospace; width: 76mm; margin: 10mm auto; font-size: 12px; line-height: 1.4; }
            .logo { font-size: 60px; text-align: center; color: #0066ff; margin-bottom: 8px; }
            .center { text-align: center; }
            table { width: 100%; border-collapse: collapse; }
            th, td { padding: 3px 0; }
            th { border-bottom: 1px dashed #000; text-align: left; }
            .right { text-align: right; }
            .bold { font-weight: bold; }
            .total-line { border-top: 1px dashed #000; padding-top: 5px; font-size: 13px; }
            .thank { margin-top: 15px; text-align: center; font-size: 11px; }
          </style>
        </head>
        <body>
          <div class="logo center">A</div>
          <div class="center bold">ARIZONA GADGETS<br><span style="color:#ff6200;">AND COMMUNICATION WRLD</span></div>
          <p class="center" style="font-size:10px;">"surest plug for your REPAIR, 📲PHONE SWAP AND DIRECT PURCHASE LAPTOP 💻"</p>
          <p class="center bold">📞 09066828130</p>

          <div style="border-top:1px dashed #000; border-bottom:1px dashed #000; padding:8px 0; margin:10px 0;">
            <div>${receipt.address}</div>
            <div style="display:flex; justify-content:space-between;">
              <span>Date: ${receipt.date}</span>
              <span>Receipt #: ${receipt.receiptNo}</span>
            </div>
          </div>

          <div>Customer: ${receipt.customer}</div>

          <table>
            <thead><tr><th>ITEM</th><th>QTY</th><th class="right">AMOUNT</th></tr></thead>
            <tbody>
              ${receipt.items.map(i => `
                <tr>
                  <td>${i.name}</td>
                  <td class="center">${i.qty}</td>
                  <td class="right">₦${(i.qty * i.price).toLocaleString()}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>

          <div style="margin-top:12px;">
            <div class="total-line bold"><span>TOTAL</span><span class="right">${receipt.total}</span></div>
            <div><span>PAID</span><span class="right">${receipt.total}</span></div>
            <div class="balance"><span>BALANCE</span><span class="right">₦0</span></div>
          </div>

          <div class="thank">
            Thank you for choosing the <strong>SUREST PLUG</strong>!<br>
            Call/WhatsApp 09066828130<br>
            FAST • QUALITY • RELIABLE
          </div>
        </body>
        </html>
      `);
      printWindow.document.close();
    }

    function clearHistory() {
      if (confirm("Are you sure you want to delete ALL saved receipts? This cannot be undone.")) {
        localStorage.removeItem("receiptHistory");
        loadHistory();
      }
    }

    window.onload = loadHistory;
  </script>
</body>
</html>
